<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="English Tutor" />
  <title>English Tutor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:     #1D9E75;
      --teal-dk:  #0F6E56;
      --teal-lt:  #E1F5EE;
      --amber-lt: #FAEEDA;
      --amber-bd: #FAC775;
      --amber-tx: #633806;
      --gray-bg:  #F8F8F6;
      --gray-bd:  #D3D1C7;
      --gray-tx:  #5F5E5A;
      --gray-ht:  #888780;
      --white:    #FFFFFF;
      --dark:     #2C2C2A;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI',
                   'Noto Sans KR', sans-serif;
      background: var(--gray-bg);
      color: var(--dark);
      overflow: hidden;
    }

    /* ── 전체 레이아웃 ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;   /* dynamic viewport height (모바일 주소창 대응) */
    }

    /* ── 헤더 ── */
    .header {
      background: var(--white);
      border-bottom: 1px solid var(--gray-bd);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .header-icon {
      font-size: 22px;
      line-height: 1;
    }
    .header-text h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--dark);
    }
    .header-text p {
      font-size: 11px;
      color: var(--gray-ht);
    }
    .clear-btn {
      margin-left: auto;
      padding: 5px 12px;
      font-size: 12px;
      border: 1px solid var(--gray-bd);
      border-radius: 20px;
      background: var(--white);
      color: var(--gray-tx);
      cursor: pointer;
    }

    /* ── 설정 바 ── */
    .settings {
      background: var(--white);
      border-bottom: 1px solid var(--gray-bd);
      padding: 8px 12px;
      flex-shrink: 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .settings::-webkit-scrollbar { display: none; }
    .settings-row {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      min-width: max-content;
    }
    .set-label {
      font-size: 11px;
      color: var(--gray-ht);
      margin-right: 2px;
    }
    .set-divider {
      width: 1px;
      height: 18px;
      background: var(--gray-bd);
      margin: 0 4px;
    }
    .chip {
      padding: 4px 10px;
      font-size: 12px;
      border: 1px solid var(--gray-bd);
      border-radius: 20px;
      background: var(--white);
      color: var(--gray-tx);
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .chip.active-teal {
      background: var(--teal-lt);
      border-color: var(--teal);
      color: var(--teal-dk);
      font-weight: 500;
    }
    .chip.active-blue {
      background: #E6F1FB;
      border-color: #378ADD;
      color: #0C447C;
      font-weight: 500;
    }

    /* ── 채팅 영역 ── */
    .chat {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg { display: flex; flex-direction: column; max-width: 82%; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot  { align-self: flex-start; align-items: flex-start; }

    .sender {
      font-size: 11px;
      color: var(--gray-ht);
      margin-bottom: 3px;
      padding: 0 2px;
    }

    .bubble {
      padding: 10px 13px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: var(--teal);
      color: white;
      border-radius: 18px 18px 4px 18px;
    }
    .msg.bot .bubble {
      background: var(--white);
      border: 1px solid var(--gray-bd);
      color: var(--dark);
      border-radius: 18px 18px 18px 4px;
    }

    .feedback {
      margin-top: 5px;
      background: var(--amber-lt);
      border: 1px solid var(--amber-bd);
      border-radius: 10px;
      padding: 8px 11px;
      font-size: 12px;
      line-height: 1.55;
      color: var(--amber-tx);
      max-width: 100%;
    }
    .feedback-label {
      font-weight: 600;
      margin-bottom: 2px;
      font-size: 11px;
    }

    .typing {
      display: flex;
      gap: 5px;
      padding: 10px 13px;
      background: var(--white);
      border: 1px solid var(--gray-bd);
      border-radius: 18px 18px 18px 4px;
      align-items: center;
      width: fit-content;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--gray-ht);
      animation: bounce 1s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.30s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40%          { transform: translateY(-6px); }
    }

    /* ── 입력 영역 ── */
    .input-area {
      background: var(--white);
      border-top: 1px solid var(--gray-bd);
      padding: 10px 12px;
      padding-bottom: calc(10px + var(--safe-bottom));
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    textarea {
      flex: 1;
      padding: 9px 13px;
      font-size: 15px;
      font-family: inherit;
      border: 1px solid var(--gray-bd);
      border-radius: 22px;
      background: var(--gray-bg);
      color: var(--dark);
      resize: none;
      outline: none;
      line-height: 1.45;
      min-height: 40px;
      max-height: 110px;
      overflow-y: auto;
      -webkit-appearance: none;
    }
    textarea:focus {
      border-color: var(--teal);
      background: var(--white);
    }
    .send-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--teal);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .send-btn:active { background: var(--teal-dk); }
    .send-btn:disabled { background: var(--gray-bd); }
    .send-btn svg { width: 18px; height: 18px; fill: white; }

    /* ── IP 안내 배너 ── */
    .ip-banner {
      background: #E6F1FB;
      border-bottom: 1px solid #B5D4F4;
      padding: 8px 14px;
      font-size: 12px;
      color: #0C447C;
      flex-shrink: 0;
      text-align: center;
    }

    /* ── 스크롤바 ── */
    .chat::-webkit-scrollbar { width: 4px; }
    .chat::-webkit-scrollbar-thumb { background: var(--gray-bd); border-radius: 4px; }
  </style>
</head>
<body>
<div class="app">

  <!-- 헤더 -->
  <div class="header">
    <div class="header-icon">🎓</div>
    <div class="header-text">
      <h1>English Tutor</h1>
      <p>AI 영어 회화 튜터 · Powered by Claude</p>
    </div>
    <button class="clear-btn" onclick="clearChat()">초기화</button>
  </div>

  <!-- IP 안내 (PC에서만 표시) -->
  <div class="ip-banner" id="ipBanner" style="display:none">
    📱 스마트폰에서 접속하려면: <strong id="ipAddr">http://[IP]:5000</strong> 으로 접속하세요
  </div>

  <!-- 설정 바 -->
  <div class="settings">
    <div class="settings-row">
      <span class="set-label">난이도</span>
      <button class="chip active-teal" data-group="level" data-val="beginner"     onclick="setChip(this)">🌱 초급</button>
      <button class="chip"             data-group="level" data-val="intermediate" onclick="setChip(this)">🌿 중급</button>
      <button class="chip"             data-group="level" data-val="advanced"     onclick="setChip(this)">🌳 고급</button>
      <div class="set-divider"></div>
      <span class="set-label">주제</span>
      <button class="chip active-blue" data-group="topic" data-val="free"     onclick="setChip(this)">💬 자유</button>
      <button class="chip"             data-group="topic" data-val="travel"   onclick="setChip(this)">✈️ 여행</button>
      <button class="chip"             data-group="topic" data-val="food"     onclick="setChip(this)">🍜 음식</button>
      <button class="chip"             data-group="topic" data-val="work"     onclick="setChip(this)">💼 직장</button>
      <button class="chip"             data-group="topic" data-val="hobby"    onclick="setChip(this)">🎨 취미</button>
      <button class="chip"             data-group="topic" data-val="shopping" onclick="setChip(this)">🛍️ 쇼핑</button>
    </div>
  </div>

  <!-- 채팅 -->
  <div class="chat" id="chat"></div>

  <!-- 입력 -->
  <div class="input-area">
    <textarea id="inputBox" rows="1" placeholder="영어로 자유롭게 입력하세요..."></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMsg()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  let history = []
  let level = 'beginner'
  let topic = 'free'
  let loading = false

  // ── 설정 칩 ──────────────────────────────────────────────
  function setChip(el) {
    const group = el.dataset.group
    const activeClass = group === 'level' ? 'active-teal' : 'active-blue'
    document.querySelectorAll(`[data-group="${group}"]`).forEach(b => b.classList.remove(activeClass))
    el.classList.add(activeClass)
    if (group === 'level') level = el.dataset.val
    else topic = el.dataset.val
  }

  // ── 메시지 추가 ───────────────────────────────────────────
  function addMsg(role, text, feedback) {
    const chat = document.getElementById('chat')
    const div = document.createElement('div')
    div.className = `msg ${role}`

    const sender = document.createElement('div')
    sender.className = 'sender'
    sender.textContent = role === 'user' ? '나' : 'Tutor'

    const bubble = document.createElement('div')
    bubble.className = 'bubble'
    bubble.textContent = text

    div.appendChild(sender)
    div.appendChild(bubble)

    if (feedback) {
      const fb = document.createElement('div')
      fb.className = 'feedback'
      fb.innerHTML = `<div class="feedback-label">💡 피드백</div>${escHtml(feedback)}`
      div.appendChild(fb)
    }

    chat.appendChild(div)
    chat.scrollTop = chat.scrollHeight
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  }

  function showTyping() {
    const chat = document.getElementById('chat')
    const div = document.createElement('div')
    div.className = 'msg bot'
    div.id = 'typing'
    div.innerHTML = `<div class="sender">Tutor</div>
      <div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`
    chat.appendChild(div)
    chat.scrollTop = chat.scrollHeight
  }

  function removeTyping() {
    const el = document.getElementById('typing')
    if (el) el.remove()
  }

  // ── 전송 ─────────────────────────────────────────────────
  async function sendMsg() {
    if (loading) return
    const box = document.getElementById('inputBox')
    const text = box.value.trim()
    if (!text) return

    box.value = ''
    box.style.height = 'auto'
    loading = true
    document.getElementById('sendBtn').disabled = true

    addMsg('user', text)
    history.push({ role: 'user', content: text })
    showTyping()

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history, level, topic })
      })
      const data = await res.json()
      removeTyping()

      if (data.error) {
        addMsg('bot', `오류: ${data.error}`, '')
      } else {
        history.push({ role: 'assistant', content: JSON.stringify(data) })
        addMsg('bot', data.reply || '', data.feedback || '')
      }
    } catch (e) {
      removeTyping()
      addMsg('bot', '네트워크 오류가 발생했습니다. 서버가 실행 중인지 확인하세요.', '')
    }

    loading = false
    document.getElementById('sendBtn').disabled = false
    box.focus()
  }

  function clearChat() {
    history = []
    document.getElementById('chat').innerHTML = ''
    addMsg('bot', "Hello! Let's start fresh. 😊 What would you like to talk about today?", '')
  }

  // ── 입력창 자동 높이 ──────────────────────────────────────
  document.getElementById('inputBox').addEventListener('input', function() {
    this.style.height = 'auto'
    this.style.height = Math.min(this.scrollHeight, 110) + 'px'
  })
  document.getElementById('inputBox').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey && !/Android|iPhone/i.test(navigator.userAgent)) {
      e.preventDefault()
      sendMsg()
    }
  })

  // ── PC에서 IP 안내 표시 ───────────────────────────────────
  if (!/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
    fetch('/get_ip').then(r => r.json()).then(d => {
      if (d.ip) {
        document.getElementById('ipAddr').textContent = `http://${d.ip}:5000`
        document.getElementById('ipBanner').style.display = 'block'
      }
    }).catch(() => {})
  }

  // ── 시작 메시지 ───────────────────────────────────────────
  addMsg('bot',
    "Hello! I'm your English conversation tutor. 😊 " +
    "What would you like to talk about today? " +
    "Feel free to write in English — I'll gently correct any mistakes!",
    ''
  )
</script>
</body>
</html>
